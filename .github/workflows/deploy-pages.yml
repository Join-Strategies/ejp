name: Deploy GitHub Pages (multi-branch)

on:
  push:
    branches:
      - main
      - design/figma-march-2026

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout design branch
        uses: actions/checkout@v4
        with:
          ref: design/figma-march-2026
          path: design

      - name: Assemble site
        run: |
          mkdir -p _site/design
          # Main branch → root
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' main/ _site/
          # Design branch → /design/
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' design/ _site/design/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
